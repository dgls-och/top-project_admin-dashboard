<!doctype>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        
        <div class="nav-bar-1">
        
          <div class="search">
            <span class="search-icon"><img src="./img.png" alt="search icon" width="20" /></span>
            <input type="text" />
          </div>
          
          <div class="divider">
            <a href="#" class="notification-icon"><img src="./img.png" alt="notification icon" width="40" /></a>
          
            <div class="user-profile">
              <a href="#" class="user-img"><img src="./img.png" alt="user-img" width="20" /></a>
              <a href="#" class="user-name"><span class="user-name">Morgan Oakley</span></a>
            </div>
          </div>
          
        </div>
        
        <div class="nav-bar-2">
          <div class="user-info">
            <img src="./img.png" alt="" width="40" />
            <div class="user-info-text">
              <p class="small-text">Hi there,</p>
              <p class="">Morgan Oakley (@morgan)</p>
            </div>
          </div>
          <div class="nav-bar-2-links">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
          </div>
        </div>

      </div>
        
      <div class="sidebar"></div>
      <div class="main"></div>
    </div>
  </body>
</html>
